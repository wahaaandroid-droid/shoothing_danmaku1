<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GIGAS CORE - Danmaku Shooter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="720" height="1280" aria-label="GIGAS CORE danmaku shooter"></canvas>
      <div class="overlay" id="overlay">
        <div class="panel">
          <h1>GIGAS CORE</h1>
          <p>ABYSSAL DEEP</p>
          <div class="controls-guide" aria-label="操作方法">
            <section>
              <h2>PC</h2>
              <ul>
                <li>移動: 矢印キー / WASD</li>
                <li>レーザー: Shift</li>
                <li>ボム / ハイパー: X</li>
                <li>開始: Space / START</li>
                <li>一時停止: P</li>
              </ul>
            </section>
            <section>
              <h2>スマホ</h2>
              <ul>
                <li>移動: 画面をドラッグ</li>
                <li>レーザー: スワイプ中</li>
                <li>ボム / ハイパー: 右下ボタン</li>
                <li>自動ショット: 常時発射</li>
              </ul>
            </section>
          </div>
          <button id="startButton">START</button>
        </div>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
